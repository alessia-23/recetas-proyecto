upstream grupo_nodos {
    server nodo-web-1:3000 weight=3;
    server nodo-web-2:3000 weight=2;
    server nodo-web-3:3000 weight=1;
}

server {
    listen 80;

    location / {
        proxy_pass http://grupo_nodos;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}