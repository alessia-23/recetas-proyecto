name: recetas-distribuido

services:

  # --- BASE DE DATOS MAESTRO ---
  servidor-maestro:
    image: mysql:8.0
    container_name: servidor-maestro
    restart: unless-stopped
    command: --server-id=1 --log-bin=mysql-bin --binlog-format=ROW
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
    volumes:
      - ./mysql/base-datos.sql:/docker-entrypoint-initdb.d/base-datos.sql:ro
      - datos_maestro:/var/lib/mysql
    networks:
      - red_backend

  # --- BASE DE DATOS ESCLAVO ---
  servidor-esclavo:
    image: mysql:8.0
    container_name: servidor-esclavo
    restart: unless-stopped
    command: --server-id=2 --read-only=1
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
    volumes:
      - datos_esclavo:/var/lib/mysql
    networks:
      - red_backend

  # --- NODOS DE APLICACIÓN WEB ---
  nodo-web-1:
    build: ./app
    container_name: nodo-web-1
    restart: unless-stopped
    environment:
      - BD_HOST_ESCRITURA=servidor-maestro
      - BD_HOST_LECTURA=servidor-esclavo
    depends_on:
      - servidor-maestro
      - servidor-esclavo
    networks:
      - red_backend
      - red_frontend
    mem_limit: 512m
    cpus: 1.0

  nodo-web-2:
    build: ./app
    container_name: nodo-web-2
    restart: unless-stopped
    environment:
      - BD_HOST_ESCRITURA=servidor-maestro
      - BD_HOST_LECTURA=servidor-esclavo
    depends_on:
      - servidor-maestro
      - servidor-esclavo
    networks:
      - red_backend
      - red_frontend
    mem_limit: 256m
    cpus: 0.5

  nodo-web-3:
    build: ./app
    container_name: nodo-web-3
    restart: unless-stopped
    environment:
      - BD_HOST_ESCRITURA=servidor-maestro
      - BD_HOST_LECTURA=servidor-esclavo
    depends_on:
      - servidor-maestro
      - servidor-esclavo
    networks:
      - red_backend
      - red_frontend
    mem_limit: 512m
    cpus: 1.0

  # --- BALANCEADOR DE CARGA ---
  balanceador-nginx:
    image: nginx:alpine
    container_name: balanceador-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/balanceador.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nodo-web-1
      - nodo-web-2
      - nodo-web-3
    networks:
      - red_frontend

networks:
  red_backend:
    driver: bridge
  red_frontend:
    driver: bridge

volumes:
  datos_maestro:
  datos_esclavo: